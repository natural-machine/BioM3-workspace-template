# ===========================================================================
# Full pipeline demo using the mini SH3 dataset (2 prompts)
#
# Run: python run_pipeline.py _sample_pipeline_configs/full_demo.toml
# ===========================================================================

# ---------------------------------------------------------------------------
# --- [pipeline] — Which steps to run (in order)
# ---------------------------------------------------------------------------

[pipeline]
steps = [400, 500, 600, 610, 700, 800]

# ---------------------------------------------------------------------------
# --- [environments] — Conda environment names for each step group
# ---------------------------------------------------------------------------

[environments]
biom3     = "biom3-env"       # Steps 100-400, 700-900
colabfold = "colabfold"       # Step 500
blast     = "blast-env"       # Step 600

# ---------------------------------------------------------------------------
# --- [paths] — Input/output paths
# ---------------------------------------------------------------------------

[paths]
output_dir   = "outputs/SH3_mini_demo_generation_variants"
training_csv = "data/datasets/SH3_mini/FINAL_SH3_mini_all_dataset_with_prompts.csv"

# ---------------------------------------------------------------------------
# --- [embedding] — Step 200 options
# ---------------------------------------------------------------------------

[embedding]
extra_args = [
    "--batch_size", "128",
    "--device",     "cuda",
]

# ---------------------------------------------------------------------------
# --- [finetuning] — Step 300 options
# ---------------------------------------------------------------------------

[finetuning]
epochs = 3
extra_args = [
    "--config",     "configs/stage3_training/finetune.json",
    "--batch_size", "64",
    "--device",     "cuda",
]

# ---------------------------------------------------------------------------
# --- [generation] — Step 400 options
# ---------------------------------------------------------------------------

[generation_defaults]
prompts_csv = "data/datasets/SH3_mini/SH3_prompts.csv"
model_weights = "weights/ProteoScribe/ProteoScribe_SH3_epoch52.ckpt/single_model.pth"
extra_args = [
    "--batch_size",         "128",
    "--animate_prompts",    "0", "1",
    "--animate_replicas",   "1",
    "--animation_style",    "gauge",
    "--animation_metrics",  "confidence",
    "--store_probabilities",
]

[[generation]]
variant = "random-sample"
extra_args = [
    "--unmasking_order",    "random",
    "--token_strategy",     "sample",
]

[[generation]]
variant = "confidence-sample"
extra_args = [
    "--unmasking_order",    "confidence",
    "--token_strategy",     "sample",
]

[[generation]]
variant = "confidence_no_pad-sample"
extra_args = [
    "--unmasking_order",    "confidence_no_pad",
    "--token_strategy",     "sample",
]

# ---------------------------------------------------------------------------
# --- [blast] — Step 600 options
# ---------------------------------------------------------------------------

[blast]
extra_args = ["--db", "swissprot", "--threads", "8"]

# ---------------------------------------------------------------------------
# --- [fetch_structures] — Step 610 options
# ---------------------------------------------------------------------------

# Uses defaults (UniProt API lookup, AlphaFold fallback)
