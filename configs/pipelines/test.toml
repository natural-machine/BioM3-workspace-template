# ===========================================================================
# Pipeline configuration template for BioM3
#
# Copy this file and replace <FAMILY> placeholders with your protein family name.
# Run: python run_pipeline.py configs/pipelines/<FAMILY>.toml
#
# For a quick test, try running with fewer epochs and a mini dataset:
#   python scripts/create_mini_dataset.py data/<FAMILY>/<dataset>.csv \
#       -n 500 -o data/<FAMILY>_mini/<dataset_mini>.csv --seed 42
# ===========================================================================

# ---------------------------------------------------------------------------
# [pipeline] — Which steps to run (in order)
# ---------------------------------------------------------------------------
# --- Available steps: 100, 200, 300, 400, 500, 600, 610, 700, 800
# ---   100 = Build dataset
# ---   200 = Embedding (PenCL + Facilitator)
# ---   300 = Finetuning (ProteoScribe)
# ---   400 = Generation (sequence sampling + FASTA)
# ---   500 = Structure prediction (ColabFold)
# ---   600 = BLAST homology search
# ---   610 = Fetch reference structures for BLAST hits
# ---   700 = Structure comparison (TMalign)
# ---   800 = Plot results
# ---
# --- For a full pipeline run (Steps 100-800):

[pipeline]
# --- From creation of dataset through the whole pipeline
steps = [200, 300, 400]

# --- From a pre-existing dataset through the whole pipeline
# steps = [200, 300, 400, 500, 600, 610, 700, 800]

# --- For analysis only (requires prior Step 400 FASTA output):
# steps = [500, 600, 610, 700, 800]

# ---------------------------------------------------------------------------
# [environments] — Conda environment names for each step group
# ---------------------------------------------------------------------------

[environments]
biom3     = "biom3-env"       # Steps 100-400, 700-900
colabfold = "colabfold"       # Step 500
blast     = "blast-env"       # Step 600

# ---------------------------------------------------------------------------
# [paths] — Input/output paths
# ---------------------------------------------------------------------------

[paths]
# --- Base path for all outputs
output_dir  = "outputs/TEST"

# --- Training dataset (used by Step 200 when skipping Step 100)
training_csv   = "data/datasets/SH3_mini/FINAL_SH3_mini_all_dataset_with_prompts.csv"

# ---------------------------------------------------------------------------
# [build_dataset] — Step 100 options
# ---------------------------------------------------------------------------
# --- Required: pfam_ids must list one or more Pfam family IDs.
# --- Database and training data paths default to configs/dbio_config.json.
# --- training_csv overrides [paths].training_csv for this variant's output.
# --- Use [[build_dataset]] variants to build multiple datasets and fan out.

# [build_dataset]
# pfam_ids = ["PF00018"]
# training_csv = "outputs/TEST/TEST_dataset.csv"  # overrides [paths] default
# extra_args = [
#     "--config", "configs/dbio_config.json",
#     "--enrich_pfam",
#     "--annotation_cache", "data/databases/.cache/trembl_annotations.parquet",
#     "--add_taxonomy",
# ]

# ---------------------------------------------------------------------------
# [embedding] — Step 200 options
# ---------------------------------------------------------------------------
# --- All flags pass through to 0200_embedding.sh via extra_args.
# --- Defaults: pencl_weights, facilitator_weights, pencl_config,
# --- facilitator_config, batch_size=32, dataset_key=MMD_data, device=cuda.

# [embedding]
# extra_args = ["--batch_size", "128"]

# ---------------------------------------------------------------------------
# [finetuning] — Step 300 options
# ---------------------------------------------------------------------------

[finetuning]
epochs = 3
extra_args = ["--config", "configs/stage3_training/finetune.json", "--batch_size", "64"]

# ---------------------------------------------------------------------------
# [generation] — Step 400 options (defaults: proteoscribe_config=stage3_ProteoScribe_sample.json,
# --- batch_size=256, dataset_key=MMD_data, device=cuda)
# ---------------------------------------------------------------------------

# --- Default values inherited by all [[generation]] variants below.
# --- Variant extra_args are concatenated with defaults extra_args.
[generation_defaults]
prompts_csv = "data/datasets/SH3_mini/SH3_prompts.csv"
model_weights = "weights/ProteoScribe/ProteoScribe_SH3_epoch52.ckpt/single_model.pth"
extra_args = [
    "--batch_size", "128",
    "--animate_prompts", "all",
    "--animate_replicas", "3",
    "--animation_style", "brightness",
    "--animation_metrics", "confidence",
    "--store_probabilities",
]

[[generation]]
variant    = "random-sample"
extra_args = ["--unmasking_order", "random", "--token_strategy", "sample"]

[[generation]]
variant    = "confidence-sample"
extra_args = ["--unmasking_order", "confidence", "--token_strategy", "sample"]

[[generation]]
variant    = "confidence_no_pad-sample"
extra_args = ["--unmasking_order", "confidence_no_pad", "--token_strategy", "sample"]

# ---------------------------------------------------------------------------
# [blast] — Step 600 options
# ---------------------------------------------------------------------------
[blast]
extra_args = ["--db", "swissprot", "--threads", "16"]

# ---------------------------------------------------------------------------
# [fetch_structures] — Step 610 options
# ---------------------------------------------------------------------------

# [fetch_structures]
# extra_args = ["--swissprot-dat", "/path/to/uniprot_sprot.dat.gz"]

# ---------------------------------------------------------------------------
# [webapp] — Step 900 options
# ---------------------------------------------------------------------------
# [webapp]
# port = 8501
