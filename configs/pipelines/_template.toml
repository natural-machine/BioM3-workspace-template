# ===========================================================================
# Pipeline configuration template for BioM3
#
# Copy this file and replace <FAMILY> placeholders with your protein family name.
# Run: python run_pipeline.py configs/pipelines/<FAMILY>.toml
#
# For a quick test, try running with fewer epochs and a mini dataset:
#   python scripts/create_mini_dataset.py data/<FAMILY>/<dataset>.csv \
#       -n 500 -o data/<FAMILY>_mini/<dataset_mini>.csv --seed 42
# ===========================================================================

# ---------------------------------------------------------------------------
# [pipeline] — Which steps to run (in order)
# ---------------------------------------------------------------------------
# --- Available steps: 100, 200, 300, 400, 500, 600, 610, 700, 800, 900
# ---   100 = Build dataset
# ---   200 = Embedding (PenCL + Facilitator)
# ---   300 = Finetuning (ProteoScribe)
# ---   400 = Generation (sequence sampling + FASTA)
# ---   500 = Structure prediction (ColabFold)
# ---   600 = BLAST homology search
# ---   610 = Fetch reference structures for BLAST hits
# ---   700 = Structure comparison (TMalign)
# ---   800 = Plot results
# ---   900 = Web app (interactive, not in default order)
# ---
# --- For a full pipeline run (Steps 100-800):

[pipeline]
steps = [100, 200, 300, 400, 500, 600, 610, 700, 800]
# For analysis only (requires prior Step 400 FASTA output):
# steps = [500, 600, 610, 700, 800]

# ---------------------------------------------------------------------------
# [environments] — Conda environment names for each step group
# ---------------------------------------------------------------------------

[environments]
biom3     = "biom3-env"       # Steps 100-400, 700-900
colabfold = "colabfold"       # Step 500
blast     = "blast-env"       # Step 600

# ---------------------------------------------------------------------------
# [paths] — Input/output paths
# ---------------------------------------------------------------------------

[paths]
output_dir  = "outputs/<FAMILY>"
input_csv   = "data/<FAMILY>/<FAMILY>_dataset.csv"
prompts_csv = "data/<FAMILY>/<FAMILY>_prompts.csv"
epochs      = 50

# Uncomment to override auto-detected paths:
# model_weights = "outputs/<FAMILY>/finetuning/checkpoints/<run_id>/state_dict.best.pth"
# pt_file       = "outputs/<FAMILY>/generation/<FAMILY>_prompts.ProteoScribe_output.pt"

# ---------------------------------------------------------------------------
# [build_dataset] — Step 100 options
# ---------------------------------------------------------------------------
# --- All additional options are passed through to biom3_build_dataset.

# [build_dataset]
# extra_args = []

# ---------------------------------------------------------------------------
# [embedding] — Step 200 options (all optional, shown with defaults)
# ---------------------------------------------------------------------------

# [embedding]
# pencl_weights      = "weights/PenCL/PenCL_V09152023_last.ckpt"
# facilitator_weights = "weights/Facilitator/Facilitator_MMD15.ckpt/last.ckpt"
# pencl_config       = "configs/inference/stage1_PenCL.json"
# facilitator_config = "configs/inference/stage2_Facilitator.json"
# batch_size         = 32
# dataset_key        = "MMD_data"
# device             = "cuda"
# extra_args         = []      # arbitrary extra --key value pairs passed through

# ---------------------------------------------------------------------------
# [finetuning] — Step 300 options
# ---------------------------------------------------------------------------

[finetuning]
config = "configs/stage3_training/finetune.json"
# device = "cuda"

# ---------------------------------------------------------------------------
# [generation] — Step 400 options (all optional, defaults come from config JSON)
# ---------------------------------------------------------------------------

# --- Single configuration (use [generation]):

# [generation]
# unmasking_order = "random"              # random | confidence | confidence_no_pad
# token_strategy  = "sample"              # sample | argmax
# pencl_weights      = "weights/PenCL/PenCL_V09152023_last.ckpt"
# facilitator_weights = "weights/Facilitator/Facilitator_MMD15.ckpt/last.ckpt"
# pencl_config       = "configs/inference/stage1_PenCL.json"
# facilitator_config = "configs/inference/stage2_Facilitator.json"
# proteoscribe_config = "configs/inference/stage3_ProteoScribe_sample.json"
# batch_size         = 256
# dataset_key        = "MMD_data"
# device             = "cuda"
# animate_prompts = [0, 1, 2]             # prompt indices to animate, or omit
# animate_replicas = 1                    # replicas to animate per prompt
# animation_dir   = "outputs/<FAMILY>/generation/animations"
# animation_style = "brightness"          # brightness | colorbar | logo
# animation_metrics = ["confidence"]      # per-position metric boxes
# store_probabilities = true              # save per-step probability distributions
# extra_args         = []                 # arbitrary extra --key value pairs passed through

# --- Multiple configurations (use [[generation]]):
# --- Each variant gets its own output directory (auto-derived or explicit).
# --- Downstream steps fan out automatically — one run per variant.

# [[generation]]
# variant         = "random"
# unmasking_order = "random"
# token_strategy  = "sample"
#
# [[generation]]
# variant         = "confidence"
# unmasking_order = "confidence"
# token_strategy  = "argmax"

# ---------------------------------------------------------------------------
# [blast] — Step 600 options
# ---------------------------------------------------------------------------
# --- Set fan_out = false on any step section to collapse variant fan-out and
# --- run the step once with base paths instead of once per upstream variant.

[blast]
db      = "swissprot"        # swissprot | pdbaa | nr | /path/to/local/db
threads = 16
# remote = true              # force remote NCBI search
# local  = true              # force local search
# max_targets = 5            # max target sequences per query
# fan_out = false             # collapse upstream fan-out (run once with base paths)

# ---------------------------------------------------------------------------
# [fetch_structures] — Step 610 options
# ---------------------------------------------------------------------------

# [fetch_structures]
# swissprot_dat = "/path/to/uniprot_sprot.dat.gz"  # local DAT for offline PDB lookup
# no_local_dat  = true       # skip local DAT auto-detection, use UniProt API
# alphafold_only = true      # skip experimental PDB, AlphaFold only
# experimental_only = true   # skip AlphaFold fallback

# ---------------------------------------------------------------------------
# [webapp] — Step 900 options
# ---------------------------------------------------------------------------
# [webapp]
# port = 8501
